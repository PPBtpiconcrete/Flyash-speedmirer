
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fly Ash Meter</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2a44">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f2a44;
    color: white;
    padding: 20px;
}

.container {
    max-width: 420px;
    margin: auto;
}

h1 {
    text-align: center;
}

.card {
    background: #173b5c;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    font-size: 18px;
}

button {
    width: 48%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 18px;
    cursor: pointer;
}

.calculate {
    background: #ff7a1a;
    color: white;
}

.reset {
    background: #555;
    color: white;
}

.result {
    text-align: center;
    font-size: 32px;
    margin-top: 10px;
}

.zone {
    text-align: center;
    font-size: 18px;
    margin-top: 5px;
}

canvas {
    display: block;
    margin: auto;
}
</style>
</head>

<body>

<div class="container">

<h1>Fly Ash Meter</h1>

<div class="card">

<label>Cement HYD</label>
<input type="number" id="hyd" value="20">

<label>Cement Premium</label>
<input type="number" id="premium" value="1.5">

<label>Fly Ash</label>
<input type="number" id="flyash" step="0.0001">

<button class="calculate" onclick="calculate()">CALCULATE</button>
<button class="reset" onclick="resetForm()">RESET</button>

</div>

<div class="card">

<canvas id="gauge" width="300" height="180"></canvas>

<div class="result" id="result">
0.00%
</div>

<div class="zone" id="zone">
-
</div>

</div>

</div>

<script>

function drawGauge(percent) {

    var canvas = document.getElementById("gauge");
    var ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    var centerX = 150;
    var centerY = 150;
    var radius = 120;

    function arc(start, end, color) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius,
            Math.PI * start,
            Math.PI * end);
        ctx.lineWidth = 20;
        ctx.strokeStyle = color;
        ctx.stroke();
    }

    arc(1, 1.3, "green");
    arc(1.3, 1.7, "gold");
    arc(1.7, 2, "red");

    var angle = 1 + percent / 100;

    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(
        centerX + radius * Math.cos(Math.PI * angle),
        centerY + radius * Math.sin(Math.PI * angle)
    );
    ctx.lineWidth = 4;
    ctx.strokeStyle = "white";
    ctx.stroke();
}

function calculate() {

    var hyd =
        parseFloat(document.getElementById("hyd").value) || 0;

    var premium =
        parseFloat(document.getElementById("premium").value) || 0;

    var flyash =
        parseFloat(document.getElementById("flyash").value) || 0;

    var total =
        hyd + premium + flyash;

    if (total === 0) return;

    var percent =
        (flyash / total) * 100;

    percent =
        percent.toFixed(2);

    document.getElementById("result").innerHTML =
        percent + "%";

    var zone = "";

    if (percent <= 30) {
        zone = "GREEN";
    }
    else if (percent <= 70) {
        zone = "YELLOW";
    }
    else {
        zone = "RED";
    }

    document.getElementById("zone").innerHTML =
        zone;

    drawGauge(percent);
}

function resetForm() {

    document.getElementById("hyd").value = "";
    document.getElementById("premium").value = "";
    document.getElementById("flyash").value = "";

    document.getElementById("result").innerHTML =
        "0.00%";

    document.getElementById("zone").innerHTML =
        "-";

    drawGauge(0);
}

drawGauge(0);

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
